services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calculadora}
      POSTGRES_USER: ${POSTGRES_USER:-calculadora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calculadora}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calculadora} -d ${POSTGRES_DB:-calculadora}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-calculadora}:${POSTGRES_PASSWORD:-calculadora}@db:5432/${POSTGRES_DB:-calculadora}
      APP_MODULE: ${APP_MODULE:-main:app}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-3000}
      PORT: ${PORT:-3000}
      APP_ROOT_PATH: ${APP_ROOT_PATH:-}
      FRONTEND_BASE_PATH: ${FRONTEND_BASE_PATH:-}
      ROOT_PATH: ${ROOT_PATH:-}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
